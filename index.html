    <title>Praesidium — Sci-Fi Tower Defense</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #060a0f;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #c {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
        touch-action: none;
      }
      #err {
        position: fixed; inset: 0;
        display: none;
        flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.96);
        color: #f87171;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        padding: 40px;
        z-index: 9999;
        gap: 16px;
        text-align: center;
      }
      #err h2 { color: #fca5a5; font-size: 22px; font-family: sans-serif; }
      #err pre { max-width: 80vw; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
      #err button {
        margin-top: 8px; padding: 10px 28px;
        background: #3b82f6; color: #fff;
        border: none; border-radius: 8px;
        font-size: 14px; cursor: pointer;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CpYfwaNh.js"></script>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="err">
      <h2>⚠ Praesidium crashed</h2>
      <pre id="err-msg">Unknown error</pre>
      <button onclick="location.reload()">Reload</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('err');
        var msg = document.getElementById('err-msg');
        if (!el || !msg) return;
        msg.textContent = (e.error && e.error.stack) || e.message || 'Unknown error';
        el.style.display = 'flex';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('err');
        var msg = document.getElementById('err-msg');
        if (!el || !msg) return;
        msg.textContent = (e.reason && e.reason.stack) || String(e.reason) || 'Promise rejected';
        el.style.display = 'flex';
      });
      // Proactively unregister any legacy service workers that may be caching stale files
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var reg of registrations) {
            reg.unregister().then(function() {
              console.log('[Praesidium] Legacy Service Worker unregistered.');
            });
          }
        }).catch(function(err) {
          console.error('[Praesidium] SW unregister error:', err);
        });
      }
    </script>
  </body>
