    <title>Praesidium — Sci-Fi Tower Defense</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #060a0f;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #c {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: crosshair;
        touch-action: none;
      }
      #boot-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 20;
        gap: 12px;
        color: #dbeafe;
        background: radial-gradient(circle at 50% 38%, rgba(37, 99, 235, 0.18), transparent 34%), #060a0f;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
      }
      #boot-loading strong {
        color: #ffffff;
        font-size: 22px;
        letter-spacing: 0;
      }
      #boot-loading span {
        color: #93c5fd;
        font-size: 13px;
      }
      #orientation-hint {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 30;
        padding: 28px;
        background: linear-gradient(180deg, rgba(6,10,15,0.96), rgba(15,23,42,0.96));
        color: #e2e8f0;
        text-align: center;
        pointer-events: none;
      }
      #orientation-hint .card {
        max-width: 360px;
        border: 1px solid rgba(96,165,250,0.35);
        border-radius: 18px;
        padding: 22px 20px;
        background: rgba(15,23,42,0.78);
        box-shadow: 0 18px 60px rgba(59,130,246,0.18);
      }
      #orientation-hint strong {
        display: block;
        color: #bfdbfe;
        font-size: 18px;
        margin-bottom: 8px;
      }
      #orientation-hint span {
        display: block;
        color: #94a3b8;
        font-size: 13px;
        line-height: 1.5;
      }
      @media (orientation: portrait) and (max-width: 760px) {
        #orientation-hint { display: flex; }
      }
      #err {
        position: fixed; inset: 0;
        display: none;
        flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0,0,0,0.96);
        color: #f87171;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        padding: 40px;
        z-index: 9999;
        gap: 16px;
        text-align: center;
      }
      #err h2 { color: #fca5a5; font-size: 22px; font-family: sans-serif; }
      #err pre { max-width: 80vw; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
      #err button {
        margin-top: 8px; padding: 10px 28px;
        background: #3b82f6; color: #fff;
        border: none; border-radius: 8px;
        font-size: 14px; cursor: pointer;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-Bfdgz3fj.js"></script>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="boot-loading" aria-live="polite">
      <strong>Praesidium</strong>
      <span>Loading defense grid...</span>
    </div>
    <div id="orientation-hint" aria-hidden="true">
      <div class="card">
        <strong>Rotate for best play</strong>
        <span>Praesidium is tuned for landscape tower-defense controls. 横屏体验更好。</span>
      </div>
    </div>
    <div id="err">
      <h2>⚠ Praesidium crashed</h2>
      <pre id="err-msg">Unknown error</pre>
      <button onclick="location.reload()">Reload</button>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('err');
        var msg = document.getElementById('err-msg');
        if (!el || !msg) return;
        msg.textContent = (e.error && e.error.stack) || e.message || 'Unknown error';
        el.style.display = 'flex';
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('err');
        var msg = document.getElementById('err-msg');
        if (!el || !msg) return;
        msg.textContent = (e.reason && e.reason.stack) || String(e.reason) || 'Promise rejected';
        el.style.display = 'flex';
      });
      // Proactively unregister any legacy service workers that may be caching stale files
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var reg of registrations) {
            reg.unregister().then(function() {
              console.log('[Praesidium] Legacy Service Worker unregistered.');
            });
          }
        }).catch(function(err) {
          console.error('[Praesidium] SW unregister error:', err);
        });
      }
    </script>
  </body>
</html>
