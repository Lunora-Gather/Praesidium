<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Praesidium — a super large-scale tower defense game" />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0e14'/><circle cx='16' cy='16' r='8' fill='none' stroke='%231f6feb' stroke-width='3'/><circle cx='16' cy='16' r='3' fill='%231f6feb'/></svg>" />
    <!-- Open Graph — link preview for Twitter/Telegram/Discord -->
    <meta property="og:title" content="Praesidium — Tower Defense" />

    <meta name="twitter:card" content="summary" />

    <meta name="twitter:description" content="Super large-scale tower defense — play now, zero install" />
    <title>Praesidium</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0e14;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #e6e6e6;
      }
      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e14;
        color: #8ab4f8;
        font-size: 22px;
        letter-spacing: 4px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="boot">PRAESIDIUM · loading…</div>
    <div id="err-indicator" style="position:fixed;bottom:4px;right:4px;color:#e57373;font-size:11px;z-index:99"></div>
    <canvas id="game-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
    <script>if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js');</script>
